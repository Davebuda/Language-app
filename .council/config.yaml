project: NorskCoach
constitution: CLAUDE.md
roadmap: docs/roadmap.md
state: docs/project-state.md
review: docs/recovery-backlog.md

routing:
  ui: sonnet
  engine: sonnet
  backend: sonnet
  research: opus
  architecture: opus

research_gate:
  provider: exa
  fires_on: [approach_decision, architecture_choice, new_phase_start]
  skips_on: [mechanical_task, criteria_defined_in_roadmap]

playwright:
  enabled: true
  fires_on: [ui_change, significant_logic, phase_completion, checkpoint]
  critical_path: true

optional_models:
  codex: disabled
  gemini: disabled

escalation:
  correct_cap: 3
  triggers: any_one_of [corrections_cap, blocked_no_fix, no_viable_approach, product_decision_outside_docs]
