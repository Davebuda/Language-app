<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grid-tiles — løftet, ikke hvit · 5</title>
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--mono:'IBM Plex Mono',monospace;--sans:'Schibsted Grotesk',sans-serif;--on-dark-3:#5C6660}
  body{background:#050604;font-family:var(--sans);color:#E8ECE6;padding:30px 16px 70px}
  .row{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;max-width:1180px;margin:0 auto}
  .col{width:360px}
  .cap{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--on-dark-3);margin:0 2px 6px;display:flex;gap:8px;align-items:baseline}
  .cap b{color:#9df1ff;font-weight:600}
  .note{font-size:11px;color:var(--on-dark-3);margin:0 2px 11px;line-height:1.4}
  .stage{background:radial-gradient(260px 150px at 70% 20%,#0d1310,transparent 70%),#07090A;border:1px solid rgba(255,255,255,.12);border-radius:18px;padding:13px}
  .well{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.075);border-radius:14px;padding:9px}
  .grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

  /* shared tile structure — ONLY the surface (background/border) varies per variant */
  .til{position:relative;overflow:hidden;isolation:isolate;border-radius:13px;min-height:84px;padding:10px 10px;display:flex;flex-direction:column;justify-content:flex-end;cursor:pointer}
  .til .bloom{position:absolute;inset:0;z-index:0;background:radial-gradient(110px 96px at 70% 44%,var(--ag),transparent 70%)}
  .til .glyph{position:absolute;right:4px;top:50%;transform:translateY(-50%);z-index:0;opacity:.32;filter:drop-shadow(0 0 6px var(--ag))}
  .til .glyph svg{width:44px;height:44px;stroke:var(--a);stroke-width:.8;fill:none}
  .til .hair{position:absolute;top:0;left:11px;right:11px;height:1px;z-index:1;background:linear-gradient(90deg,transparent,var(--a),transparent);opacity:.6}
  .til .nm{position:relative;z-index:2;font-weight:700;font-size:12px;line-height:1;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.6)}
  .til .sb{position:relative;z-index:2;font-family:var(--mono);font-size:8px;color:rgba(255,255,255,.74);margin-top:3px;text-shadow:0 1px 6px rgba(0,0,0,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .a-lime{--a:#C8FF20;--ag:rgba(200,255,32,.30)}
  .a-cyan{--a:#00C2E0;--ag:rgba(0,194,224,.30)}
  .a-coral{--a:#FF6A55;--ag:rgba(255,106,85,.30)}

  /* ===== surface treatments (dark↔lifted, never white) ===== */
  /* A · Løftet glass — same dark glass, just whiter fill */
  .tA{background:linear-gradient(168deg,rgba(255,255,255,.17),rgba(255,255,255,.07) 52%,rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.16)}
  /* B · Aksent-vask — the tile takes more of its own hue */
  .tB{background:linear-gradient(160deg,color-mix(in srgb,var(--a) 30%,#0e1213),color-mix(in srgb,var(--a) 12%,#0e1213) 62%,#0c100c);border:1px solid color-mix(in srgb,var(--a) 32%,rgba(255,255,255,.1))}
  /* C · Tonet mørk — a dark tone OF the accent (colored-dark) */
  .tC{background:linear-gradient(160deg,color-mix(in srgb,var(--a) 36%,#080b09),color-mix(in srgb,var(--a) 19%,#080b09));border:1px solid color-mix(in srgb,var(--a) 34%,transparent)}
  /* D · Frostet midttone — mid grey, between dark and white */
  .tD{background:linear-gradient(168deg,#2c343a,#20272b);border:1px solid rgba(255,255,255,.14)}
  /* E · To-tone løft — dark top, lifts to an accent tint at the label */
  .tE{background:linear-gradient(180deg,#14191b 0%,#12171a 46%,color-mix(in srgb,var(--a) 26%,#12171a) 100%);border:1px solid rgba(255,255,255,.13)}
</style>
</head>
<body>
<div class="row" id="root"></div>
<script>
const I={cap:'<path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/>',msg:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',pen:'<path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/>'};
const ACC=[['a-lime',I.cap,'Lær','Dagens økt'],['a-cyan',I.msg,'Snakk','Kari · høyt'],['a-coral',I.pen,'Skriv','Journal']];
const VAR=[
  ['A','Løftet glass','Same dark glass — just a whiter fill + brighter rim. The lightest lift; reads neutral-glass, hue only in the glow.','tA'],
  ['B','Aksent-vask','The tile body takes more of its own hue (cyan tile reads cyan, etc.) — still clearly dark, just more colour.','tB'],
  ['C','Tonet mørk','A dark TONE of the accent — colored-dark cards (dark-lime, dark-cyan…). Most hue, still firmly dark.','tC'],
  ['D','Frostet midttone','A mid grey-frost surface, halfway between dark and white. Neutral lift, accent only in glow + glyph.','tD'],
  ['E','To-tone løft','Dark at the top, lifting to an accent tint where the label sits — the dark glass eased upward, not flattened to a card.','tE'],
];
let html='';
for(const [k,name,note,cls] of VAR){
  let tiles='';
  for(const [a,ic,nm,sb] of ACC){
    tiles+=`<div class="til ${cls} ${a}"><div class="bloom"></div><div class="glyph"><svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">${ic}</svg></div><div class="hair"></div><div class="nm">${nm}</div><div class="sb">${sb}</div></div>`;
  }
  html+=`<div class="col"><div class="cap">${k} <b>· ${name}</b></div><div class="note">${note}</div><div class="stage"><div class="well"><div class="grid">${tiles}</div></div></div></div>`;
}
document.getElementById('root').innerHTML=html;
</script>
</body>
</html>
