# Nginx reverse proxy for NorskCoach → pandoai.no
#
# Install on the VPS:
#   sudo cp deploy/nginx/pandoai.no.conf /etc/nginx/sites-available/pandoai.no
#   sudo ln -s /etc/nginx/sites-available/pandoai.no /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d pandoai.no -d www.pandoai.no   # provisions + manages the TLS block below
#   sudo nginx -t && sudo systemctl reload nginx
#
# Node (PM2) listens on 127.0.0.1:3000 only; this is the public TLS edge.

# HTTP → HTTPS redirect (Certbot also manages this once run).
server {
    listen 80;
    listen [::]:80;
    server_name pandoai.no www.pandoai.no;
    # Allow ACME http-01 challenge, redirect everything else.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pandoai.no www.pandoai.no;

    # TLS — paths managed by Certbot.
    ssl_certificate     /etc/letsencrypt/live/pandoai.no/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pandoai.no/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (app also sets CSP/etc. via next.config.ts; these are the edge backstop).
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Next.js immutable build assets — cache hard.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Generated audio (gitignored; rsync'd to the server or fronted by R2/CDN).
    # If served from the box, cache aggressively — files are content-addressed by id.
    location /audio/ {
        proxy_pass http://127.0.0.1:3000;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    client_max_body_size 10M;
}
